<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GA4 Dashboard</title>

  <!-- Kontent.ai Custom Element SDK -->
  <script src="https://app.kontent.ai/js-api/custom-element/v1/custom-element.min.js"></script>

  <!-- Inter — Kontent.ai's UI font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #2b3547;          /* Kontent.ai primary text */
      background: #f4f7f9;     /* Kontent.ai panel background */
      padding: 12px;
      line-height: 1.5;
    }

    /* ------------------------------------------------------------------ */
    /* Dashboard layout                                                     */
    /* ------------------------------------------------------------------ */
    .dashboard { display: flex; flex-direction: column; gap: 10px; }

    /* ------------------------------------------------------------------ */
    /* Live Now card                                                        */
    /* ------------------------------------------------------------------ */
    .live-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      border: 1px solid #dce3ec;
      border-radius: 8px;
      padding: 10px 14px;
    }

    .live-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7a99;
    }

    /* Pulsing green dot */
    .pulse-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.45);
      animation: pulse-green 1.8s ease-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0   rgba(34, 197, 94, 0.45); }
      70%  { box-shadow: 0 0 0 9px rgba(34, 197, 94, 0);    }
      100% { box-shadow: 0 0 0 0   rgba(34, 197, 94, 0);    }
    }

    .live-count {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .live-count__number {
      font-size: 24px;
      font-weight: 700;
      color: #2b3547;
      line-height: 1;
    }

    .live-count__label {
      font-size: 12px;
      color: #6b7a99;
    }

    /* ------------------------------------------------------------------ */
    /* Stats grid (3 columns)                                               */
    /* ------------------------------------------------------------------ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid #dce3ec;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .stat-card__label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7a99;
      margin-bottom: 4px;
    }

    .stat-card__value {
      font-size: 20px;
      font-weight: 700;
      color: #2b3547;
      line-height: 1.2;
    }

    /* ------------------------------------------------------------------ */
    /* Insight lists (Sources & Countries)                                  */
    /* ------------------------------------------------------------------ */
    .insights-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .insight-card {
      background: #ffffff;
      border: 1px solid #dce3ec;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .insight-card__title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7a99;
      margin-bottom: 9px;
    }

    .insight-list { display: flex; flex-direction: column; gap: 7px; }

    .insight-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .insight-row__name {
      font-size: 12px;
      font-weight: 500;
      color: #2b3547;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 0 0 90px;
    }

    .insight-row__bar-wrap {
      flex: 1;
      height: 4px;
      background: #edf1f7;
      border-radius: 2px;
      overflow: hidden;
    }

    .insight-row__bar {
      height: 100%;
      border-radius: 2px;
      background: #5569ff;      /* Kontent.ai accent blue */
      transition: width 0.4s ease;
    }

    .insight-row__count {
      font-size: 11px;
      font-weight: 600;
      color: #6b7a99;
      min-width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ------------------------------------------------------------------ */
    /* GA4 deep-link                                                        */
    /* ------------------------------------------------------------------ */
    .ga-link-wrap { text-align: center; padding-top: 2px; }

    .ga-link {
      font-size: 12px;
      font-weight: 500;
      color: #5569ff;
      text-decoration: none;
    }

    .ga-link:hover { text-decoration: underline; }

    /* ------------------------------------------------------------------ */
    /* Loading / error states                                               */
    /* ------------------------------------------------------------------ */
    .state-box {
      background: #ffffff;
      border: 1px solid #dce3ec;
      border-radius: 8px;
      padding: 24px 16px;
      text-align: center;
      color: #6b7a99;
      font-size: 13px;
    }

    .state-box--error {
      border-color: #fecdd3;
      background: #fff8f8;
      color: #b91c1c;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #dce3ec;
      border-top-color: #5569ff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    'use strict';

    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------

    /**
     * Format raw engagement seconds into a human-readable string.
     * Examples: 134 → "2m 14s"   |   45 → "45s"   |   0 → "0s"
     *
     * @param {number} totalSeconds
     * @returns {string}
     */
    function formatSeconds(totalSeconds) {
      const s = Math.round(totalSeconds);
      const m = Math.floor(s / 60);
      const rem = s % 60;
      return m > 0 ? `${m}m ${rem}s` : `${rem}s`;
    }

    /**
     * Compact number formatter.
     * 1 200 000 → "1.2M"  |  14 500 → "14.5k"  |  999 → "999"
     *
     * @param {number} n
     * @returns {string}
     */
    function formatNumber(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'k';
      return String(n);
    }

    /**
     * Thin wrapper around document.createElement.
     *
     * @param {string} tag
     * @param {string} [className]
     * @param {string} [text]
     * @returns {HTMLElement}
     */
    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    // -----------------------------------------------------------------------
    // State renderers
    // -----------------------------------------------------------------------

    function renderLoading() {
      const box = el('div', 'state-box');
      box.innerHTML = '<div class="spinner"></div>Fetching analytics\u2026';
      return box;
    }

    function renderError(message) {
      const box = el('div', 'state-box state-box--error');
      box.textContent = message;
      return box;
    }

    // -----------------------------------------------------------------------
    // Component: Top 3 insight list (Sources or Countries)
    // -----------------------------------------------------------------------

    /**
     * @param {Array<{views: number}>} items  - Already sorted, up to 3 entries.
     * @param {string}                key    - Property name to display ("source" or "country").
     * @returns {HTMLElement}
     */
    function renderInsightList(items, key) {
      const list = el('div', 'insight-list');
      const maxViews = items[0]?.views ?? 1;

      for (const item of items) {
        const row      = el('div', 'insight-row');
        const name     = el('div', 'insight-row__name', item[key]);
        const barWrap  = el('div', 'insight-row__bar-wrap');
        const bar      = el('div', 'insight-row__bar');
        const count    = el('div', 'insight-row__count', formatNumber(item.views));

        bar.style.width = `${Math.round((item.views / maxViews) * 100)}%`;
        barWrap.appendChild(bar);

        row.appendChild(name);
        row.appendChild(barWrap);
        row.appendChild(count);
        list.appendChild(row);
      }

      return list;
    }

    // -----------------------------------------------------------------------
    // Component: Full dashboard
    // -----------------------------------------------------------------------

    /**
     * @param {{ historical: object, realtime: object, gaLink: string }} data
     * @returns {HTMLElement}
     */
    function renderDashboard(data) {
      const { historical, realtime, gaLink } = data;
      const dash = el('div', 'dashboard');

      // ── Live Now card ──────────────────────────────────────────────────
      const liveCard  = el('div', 'live-card');
      const liveLabel = el('div', 'live-label');
      liveLabel.innerHTML = '<div class="pulse-dot"></div>Live Now';

      const liveCount = el('div', 'live-count');
      const liveNum   = el('span', 'live-count__number', String(realtime.activeUsers));
      const liveLbl   = el('span', 'live-count__label',
        `active user${realtime.activeUsers !== 1 ? 's' : ''}`);
      liveCount.appendChild(liveNum);
      liveCount.appendChild(liveLbl);

      liveCard.appendChild(liveLabel);
      liveCard.appendChild(liveCount);
      dash.appendChild(liveCard);

      // ── Stats grid ─────────────────────────────────────────────────────
      const grid = el('div', 'stats-grid');
      const stats = [
        { label: '30-Day Views',      value: formatNumber(historical.views) },
        { label: 'Unique Users',       value: formatNumber(historical.users) },
        { label: 'Avg. Engagement',    value: historical.avgEngagementTime  },
      ];

      for (const s of stats) {
        const card = el('div', 'stat-card');
        card.appendChild(el('div', 'stat-card__label', s.label));
        card.appendChild(el('div', 'stat-card__value', s.value));
        grid.appendChild(card);
      }
      dash.appendChild(grid);

      // ── Insight lists ──────────────────────────────────────────────────
      const hasSources   = historical.topSources?.length   > 0;
      const hasCountries = historical.topCountries?.length > 0;

      if (hasSources || hasCountries) {
        const insightsRow = el('div', 'insights-row');

        if (hasSources) {
          const card = el('div', 'insight-card');
          card.appendChild(el('div', 'insight-card__title', 'Top Sources'));
          card.appendChild(renderInsightList(historical.topSources, 'source'));
          insightsRow.appendChild(card);
        }

        if (hasCountries) {
          const card = el('div', 'insight-card');
          card.appendChild(el('div', 'insight-card__title', 'Top Countries'));
          card.appendChild(renderInsightList(historical.topCountries, 'country'));
          insightsRow.appendChild(card);
        }

        dash.appendChild(insightsRow);
      }

      // ── GA4 deep-link ──────────────────────────────────────────────────
      if (gaLink) {
        const wrap = el('div', 'ga-link-wrap');
        const link = el('a', 'ga-link', 'View full report in GA4 \u2192');
        link.href   = gaLink;
        link.target = '_blank';
        link.rel    = 'noopener noreferrer';
        wrap.appendChild(link);
        dash.appendChild(wrap);
      }

      return dash;
    }

    // -----------------------------------------------------------------------
    // Bootstrap — CustomElement.init
    // -----------------------------------------------------------------------
    const root = document.getElementById('root');

    CustomElement.init(async (element) => {
      const config      = element.config ?? {};
      const apiEndpoint = config.apiEndpoint;

      // Config guard
      if (!apiEndpoint || typeof apiEndpoint !== 'string') {
        root.appendChild(
          renderError('Configuration error: "apiEndpoint" is missing from JSON parameters.')
        );
        CustomElement.setHeight(80);
        return;
      }

      // Show loading state immediately
      root.appendChild(renderLoading());
      CustomElement.setHeight(100);

      // Item codename guard
      const codename = element.item?.codename;
      if (!codename) {
        root.innerHTML = '';
        root.appendChild(renderError('Could not determine the content item codename.'));
        CustomElement.setHeight(80);
        return;
      }

      try {
        const url      = `${apiEndpoint}?codename=${encodeURIComponent(codename)}`;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`API responded with ${response.status} ${response.statusText}`);
        }

        const data = await response.json();

        root.innerHTML = '';
        root.appendChild(renderDashboard(data));

        // Measure the rendered height and resize the iframe accordingly.
        requestAnimationFrame(() => {
          CustomElement.setHeight(document.body.scrollHeight + 8);
        });
      } catch (err) {
        root.innerHTML = '';
        root.appendChild(renderError(`Failed to load analytics: ${err.message}`));
        CustomElement.setHeight(80);
      }
    });
  </script>
</body>
</html>
