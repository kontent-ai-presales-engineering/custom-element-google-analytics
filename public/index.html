<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GA4 Dashboard</title>

  <!-- Kontent.ai Custom Element SDK -->
  <script src="https://app.kontent.ai/js-api/custom-element/v1/custom-element.min.js"></script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #1d1d1d;
      background: #f5f5f5;
      padding: 12px;
      line-height: 1.5;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                               */
    /* ------------------------------------------------------------------ */
    .dashboard { display: flex; flex-direction: column; gap: 10px; }

    /* ------------------------------------------------------------------ */
    /* Live header                                                          */
    /* ------------------------------------------------------------------ */
    .live-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 14px;
    }

    .live-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b6b6b;
    }

    /* Pulsing red dot */
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e53935;
      box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4); }
      70%  { box-shadow: 0 0 0 8px rgba(229, 57, 53, 0); }
      100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); }
    }

    .live-count {
      font-size: 22px;
      font-weight: 700;
      color: #1d1d1d;
    }

    .live-count span {
      font-size: 12px;
      font-weight: 400;
      color: #6b6b6b;
      margin-left: 4px;
    }

    /* ------------------------------------------------------------------ */
    /* 3-column stats grid                                                  */
    /* ------------------------------------------------------------------ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: #6b6b6b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #1d1d1d;
    }

    /* ------------------------------------------------------------------ */
    /* Insight lists (Sources / Countries)                                  */
    /* ------------------------------------------------------------------ */
    .insights-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .insight-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .insight-title {
      font-size: 11px;
      font-weight: 600;
      color: #6b6b6b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .insight-list { display: flex; flex-direction: column; gap: 6px; }

    .insight-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .insight-name {
      font-size: 12px;
      font-weight: 500;
      color: #1d1d1d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }

    .insight-bar-wrap {
      flex: 1;
      height: 4px;
      background: #f0f0f0;
      border-radius: 2px;
      overflow: hidden;
    }

    .insight-bar {
      height: 100%;
      border-radius: 2px;
      background: #3b5adb;
    }

    .insight-count {
      font-size: 11px;
      font-weight: 600;
      color: #6b6b6b;
      min-width: 28px;
      text-align: right;
    }

    /* ------------------------------------------------------------------ */
    /* GA4 link                                                             */
    /* ------------------------------------------------------------------ */
    .ga-link-wrap { text-align: center; }

    .ga-link {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: #3b5adb;
      text-decoration: none;
    }

    .ga-link:hover { text-decoration: underline; }

    /* ------------------------------------------------------------------ */
    /* States: loading / error                                              */
    /* ------------------------------------------------------------------ */
    .state-box {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: #6b6b6b;
      font-size: 13px;
    }

    .state-box.error { border-color: #ffcdd2; color: #c62828; background: #fff8f8; }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e0e0e0;
      border-top-color: #3b5adb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------
    function formatSeconds(totalSeconds) {
      const s = Math.round(totalSeconds);
      const m = Math.floor(s / 60);
      const rem = s % 60;
      return m > 0 ? `${m}m ${rem}s` : `${rem}s`;
    }

    function formatNumber(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return String(n);
    }

    function el(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text !== undefined) e.textContent = text;
      return e;
    }

    // -----------------------------------------------------------------------
    // Render helpers
    // -----------------------------------------------------------------------
    function renderLoading() {
      const box = el('div', 'state-box');
      box.innerHTML = '<div class="spinner"></div>Fetching analytics…';
      return box;
    }

    function renderError(message) {
      const box = el('div', 'state-box error');
      box.textContent = message;
      return box;
    }

    function renderInsightList(items, key) {
      const list = el('div', 'insight-list');
      const max = items[0]?.views ?? 1;
      for (const item of items) {
        const row = el('div', 'insight-row');
        const name = el('div', 'insight-name', item[key]);
        const barWrap = el('div', 'insight-bar-wrap');
        const bar = el('div', 'insight-bar');
        bar.style.width = `${Math.round((item.views / max) * 100)}%`;
        barWrap.appendChild(bar);
        const count = el('div', 'insight-count', formatNumber(item.views));
        row.appendChild(name);
        row.appendChild(barWrap);
        row.appendChild(count);
        list.appendChild(row);
      }
      return list;
    }

    function renderDashboard(data) {
      const { historical, realtime, gaLink } = data;

      const dash = el('div', 'dashboard');

      // --- Live header ---
      const liveHeader = el('div', 'live-header');
      const liveLabel = el('div', 'live-label');
      liveLabel.innerHTML = '<div class="pulse-dot"></div>Live Now';
      const liveCount = el('div', 'live-count');
      liveCount.innerHTML = `${realtime.activeUsers}<span>active user${realtime.activeUsers !== 1 ? 's' : ''}</span>`;
      liveHeader.appendChild(liveLabel);
      liveHeader.appendChild(liveCount);
      dash.appendChild(liveHeader);

      // --- Stats grid ---
      const grid = el('div', 'stats-grid');
      const stats = [
        { label: '30-Day Views', value: formatNumber(historical.views) },
        { label: 'Unique Users', value: formatNumber(historical.users) },
        { label: 'Avg Read Time', value: historical.avgEngagementTime },
      ];
      for (const s of stats) {
        const card = el('div', 'stat-card');
        card.appendChild(el('div', 'stat-label', s.label));
        card.appendChild(el('div', 'stat-value', s.value));
        grid.appendChild(card);
      }
      dash.appendChild(grid);

      // --- Insights row ---
      if (historical.topSources.length > 0 || historical.topCountries.length > 0) {
        const insightsRow = el('div', 'insights-row');

        if (historical.topSources.length > 0) {
          const sourceCard = el('div', 'insight-card');
          sourceCard.appendChild(el('div', 'insight-title', 'Top Sources'));
          sourceCard.appendChild(renderInsightList(historical.topSources, 'source'));
          insightsRow.appendChild(sourceCard);
        }

        if (historical.topCountries.length > 0) {
          const countryCard = el('div', 'insight-card');
          countryCard.appendChild(el('div', 'insight-title', 'Top Countries'));
          countryCard.appendChild(renderInsightList(historical.topCountries, 'country'));
          insightsRow.appendChild(countryCard);
        }

        dash.appendChild(insightsRow);
      }

      // --- GA4 deep link ---
      if (gaLink) {
        const wrap = el('div', 'ga-link-wrap');
        const link = el('a', 'ga-link', 'View full report in GA4 →');
        link.href = gaLink;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        wrap.appendChild(link);
        dash.appendChild(wrap);
      }

      return dash;
    }

    // -----------------------------------------------------------------------
    // Bootstrap
    // -----------------------------------------------------------------------
    const root = document.getElementById('root');

    CustomElement.init(async (element) => {
      const config = element.config ?? {};
      const apiEndpoint = config.apiEndpoint;

      if (!apiEndpoint || typeof apiEndpoint !== 'string') {
        root.appendChild(renderError('Configuration error: "apiEndpoint" is missing from the JSON parameters.'));
        CustomElement.setHeight(60);
        return;
      }

      root.appendChild(renderLoading());
      CustomElement.setHeight(120);

      const codename = element.item?.codename;
      if (!codename) {
        root.innerHTML = '';
        root.appendChild(renderError('Could not determine the item codename.'));
        CustomElement.setHeight(60);
        return;
      }

      try {
        const url = `${apiEndpoint}?codename=${encodeURIComponent(codename)}`;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`API returned ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();

        root.innerHTML = '';
        root.appendChild(renderDashboard(data));

        // Let the browser paint, then measure and set height
        requestAnimationFrame(() => {
          CustomElement.setHeight(document.body.scrollHeight + 8);
        });
      } catch (err) {
        root.innerHTML = '';
        root.appendChild(renderError(`Failed to load analytics: ${err.message}`));
        CustomElement.setHeight(60);
      }
    });
  </script>
</body>
</html>
